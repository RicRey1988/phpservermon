name: Agent apply release docs

on:
  push:
    branches: [feature/native-hope-ui-4.3.2-hs]
    paths: ['.agent/docs-trigger.txt']

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/native-hope-ui-4.3.2-hs
          fetch-depth: 0
      - name: Apply release documentation
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          changelog = Path('CHANGELOG.md')
          text = changelog.read_text()
          old = '''### Changed
          - Authenticated sessions persist for one year with rotating secure tokens and
            remain explicitly revocable through Logout.
          - Estado cards now show prominent semantic online, offline, warning and paused
            banners that update immediately after an XHR check.

          ### Fixed
          - VAPID key generation is no longer blocked by validation of the empty public
            key field and accepts plain contact email addresses.
          - Password visibility and quick light/dark controls now have explicit SVG
            contrast and display rules in both themes.
          '''
          new = '''### Changed
          - Removed the project-specific `hs-monitor.css` stylesheet completely. Runtime
            pages now load only the bundled Hope UI `hope-ui.min.css`, `dark.min.css` and
            `customizer.min.css` assets.
          - Migrated the application shell, server views, configuration, diagnostics,
            users, notifications, authentication and installer to native Hope UI and
            Bootstrap 5 composition.
          - Authenticated sessions persist for one year with rotating secure tokens and
            remain explicitly revocable through Logout.
          - Estado cards now show prominent semantic online, offline, warning and paused
            banners that update immediately after an XHR check.
          - Rotated the PWA cache to `psm-static-4.3.2-hs-r2` so installed clients evict
            the deleted stylesheet.

          ### Fixed
          - Aligned the light/dark, settings and notification controls in the top bar and
            rebuilt the search field with Hope UI's native joined input group.
          - Restored the native sidebar arrow placement and rotation, removed the
            duplicated lower user session block and repaired mobile open/close behavior,
            including Escape, outside-click and navigation closing.
          - VAPID key generation is no longer blocked by validation of the empty public
            key field and accepts plain contact email addresses.
          - Password visibility and quick light/dark controls now use consistently sized
            Hope UI icons and Bootstrap display utilities in both themes.
          '''
          if old not in text and new not in text:
              raise SystemExit('CHANGELOG anchor not found')
          changelog.write_text(text.replace(old, new))

          readme = Path('README.rst')
          text = readme.read_text()
          old = '''* Authentic Hope UI 2.0 dashboard with accessible cards, the original visual
            hierarchy and redesigned login, registration, recovery, configuration and
            installer screens. DataTables is not loaded.
          * A quick theme toggle in the top bar switches light/dark immediately. The
            settings gear opens the complete customizer for Auto/Dark/Light, accent,
            LTR/RTL, sidebar and navbar styles; authenticated preferences are saved per
            user and anonymous preferences remain local to the browser.
          '''
          new = '''* Authentic Hope UI 2.0 dashboard with accessible cards, the original visual
            hierarchy and redesigned login, registration, recovery, configuration and
            installer screens. DataTables is not loaded.
          * No project-specific presentation stylesheet is loaded. The complete interface
            is composed from the bundled ``hope-ui.min.css``, ``dark.min.css`` and
            ``customizer.min.css`` assets plus native Hope UI/Bootstrap utilities.
          * A quick theme toggle in the top bar switches light/dark immediately. The
            settings gear opens the complete customizer for Auto/Dark/Light, accent,
            LTR/RTL, sidebar and navbar styles; authenticated preferences are saved per
            user and anonymous preferences remain local to the browser.
          * The top search and icon controls share the native Hope UI alignment. The
            responsive sidebar uses the upstream ``sidebar-mini`` state, places and
            rotates its arrow correctly, opens on mobile and closes after navigation,
            Escape or an outside click. User session actions live only in the top menu.
          '''
          if old not in text and new not in text:
              raise SystemExit('README anchor not found')
          readme.write_text(text.replace(old, new))
          PY
          rm -f .agent/patches/011-release-docs.patch
          git config user.name 'Hosting Supremo Automation'
          git config user.email 'noreply@hostingsupremo.org'
          git add CHANGELOG.md README.rst .agent/patches
          if ! git diff --cached --quiet; then
            git commit -m 'docs: document native Hope UI migration and release'
            git push origin HEAD:feature/native-hope-ui-4.3.2-hs
          fi
