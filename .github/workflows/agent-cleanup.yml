name: Agent cleanup migration helpers

on:
  push:
    branches: [feature/native-hope-ui-4.3.2-hs]
    paths: ['.agent/cleanup-trigger.txt']

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/native-hope-ui-4.3.2-hs
          fetch-depth: 0
      - name: Remove temporary migration automation
        run: |
          set -euo pipefail
          rm -f \
            .agent/ci-trigger-001.txt \
            .agent/docs-trigger.txt \
            .agent/focus.sh \
            .agent/full-diagnostics-trigger.txt \
            .agent/phpunit-diagnostics.txt \
            .agent/phpunit-failures.txt \
            .agent/cleanup-trigger.txt \
            .github/workflows/agent-apply-docs.yml \
            .github/workflows/agent-cleanup.yml \
            .github/workflows/agent-focused-check.yml \
            .github/workflows/agent-full-diagnostics.yml \
            .github/workflows/apply-agent-patch.yml \
            .github/workflows/export-agent-worktree.yml
          rm -rf .agent/patches
          rmdir .agent 2>/dev/null || true
          git config user.name 'Hosting Supremo Automation'
          git config user.email 'noreply@hostingsupremo.org'
          git add -A
          git commit -m 'chore: remove temporary migration automation'
          git push origin HEAD:feature/native-hope-ui-4.3.2-hs
