name: Agent focused check

on:
  pull_request:
    branches: [main]
    paths: ['.agent/focus.sh']

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, curl, filter, gd, intl, json, libxml, mbstring, openssl, pdo_mysql, xml, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Run task verification
        run: bash .agent/focus.sh
      - name: Upload focused verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-focused-report
          path: .agent/*.txt
          retention-days: 1
          if-no-files-found: warn
