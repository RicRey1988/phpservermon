name: Agent full diagnostics

on:
  push:
    branches: [feature/native-hope-ui-4.3.2-hs]
    paths: ['.agent/full-diagnostics-trigger.txt']

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/native-hope-ui-4.3.2-hs
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, curl, filter, gd, intl, json, libxml, mbstring, openssl, pdo_mysql, xml, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Run complete PHPUnit suite
        id: phpunit
        continue-on-error: true
        run: vendor/bin/phpunit --testdox --colors=never > /tmp/phpunit-result.txt 2>&1
      - name: Persist diagnostic reports
        if: always()
        run: |
          set -euo pipefail
          {
            printf 'Commit: %s\n\n' "$GITHUB_SHA"
            cat /tmp/phpunit-result.txt
          } > .agent/phpunit-diagnostics.txt
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('/tmp/phpunit-result.txt').read_text(errors='replace').splitlines()
          records = []
          current = None
          for line in text:
              if line.startswith(' ✘ '):
                  if current:
                      records.append(current)
                  current = {'name': line[3:].strip(), 'message': '', 'location': ''}
                  continue
              if current is None:
                  continue
              stripped = line.strip(' │')
              if not current['message'] and (stripped.startswith('Failed asserting') or stripped.startswith('Error:')):
                  current['message'] = stripped
              match = re.search(r'(tests/[^:]+\.php:\d+)', line)
              if match and not current['location']:
                  current['location'] = match.group(1)
          if current:
              records.append(current)

          output = [f'Failures: {len(records)}', '']
          for index, record in enumerate(records, 1):
              output.append(f"{index}. {record['name']}")
              output.append(f"   {record['location'] or 'location unavailable'}")
              if record['message']:
                  output.append(f"   {record['message']}")
          summary = next((line for line in reversed(text) if line.startswith('Tests:')), '')
          if summary:
              output.extend(['', summary])
          Path('.agent/phpunit-failures.txt').write_text('\n'.join(output) + '\n')
          PY
          git config user.name 'Hosting Supremo Diagnostics'
          git config user.email 'noreply@hostingsupremo.org'
          git add .agent/phpunit-diagnostics.txt .agent/phpunit-failures.txt
          if ! git diff --cached --quiet; then
            git commit -m 'chore: capture PHPUnit diagnostics [skip ci]'
            git push origin HEAD:feature/native-hope-ui-4.3.2-hs
          fi
      - name: Preserve failure status
        if: steps.phpunit.outcome == 'failure'
        run: exit 1
