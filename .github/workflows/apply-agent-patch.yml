name: Apply agent patch

on:
  push:
    branches: [feature/native-hope-ui-4.3.2-hs]
    paths: ['.agent/patches/*.patch']

permissions:
  contents: write

concurrency:
  group: native-hope-ui-agent-patch
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/native-hope-ui-4.3.2-hs
          fetch-depth: 0
      - name: Apply queued patch
        shell: bash
        run: |
          set -euo pipefail
          PATCH=$(find .agent/patches -maxdepth 1 -type f -name '*.patch' | sort | head -n1)
          test -n "$PATCH"
          MESSAGE=$(sed -n 's/^# commit-message: //p' "$PATCH" | head -n1)
          test -n "$MESSAGE"
          tail -n +2 "$PATCH" > /tmp/agent-change.patch
          git apply --index --whitespace=error-all /tmp/agent-change.patch
          git rm "$PATCH"
          git config user.name 'Hosting Supremo Automation'
          git config user.email 'noreply@hostingsupremo.org'
          git commit -m "$MESSAGE"
          git push origin HEAD:feature/native-hope-ui-4.3.2-hs
