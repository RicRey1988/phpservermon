name: Diagnose v4.3.3 release

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      TARGET_SHA: 8e80d3d66316f56e8ab27582ee66c1de6b2d16c4
      TARGET_TAG: v4.3.3-hs
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Lint and export main workflows
        run: |
          set -euo pipefail
          mkdir -p /tmp/release-diagnostics/workflows
          cp -a .github/workflows/. /tmp/release-diagnostics/workflows/
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          set +e
          "$(go env GOPATH)/bin/actionlint" -color=false .github/workflows/*.yml > /tmp/release-diagnostics/actionlint.txt 2>&1
          echo "actionlint_exit=$?" > /tmp/release-diagnostics/actionlint-status.txt
          set -e
          cat /tmp/release-diagnostics/actionlint.txt
      - name: Inspect workflow runs, checks and release state
        run: |
          set -euo pipefail
          gh api "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$TARGET_SHA&per_page=100" > /tmp/release-diagnostics/runs.json
          gh api -H 'Accept: application/vnd.github+json' "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/check-runs?per_page=100" > /tmp/release-diagnostics/check-runs.json
          gh api "repos/$GITHUB_REPOSITORY/commits/$TARGET_SHA/check-suites?per_page=100" > /tmp/release-diagnostics/check-suites.json
          {
            echo "target_sha=$TARGET_SHA"
            echo "target_tag=$TARGET_TAG"
            echo "checked_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo 'actionlint:'
            cat /tmp/release-diagnostics/actionlint-status.txt
            cat /tmp/release-diagnostics/actionlint.txt
            echo
            echo 'workflow_runs:'
            jq -r '.workflow_runs[] | [.id,.name,.event,.status,(.conclusion // ""),.head_sha,.html_url] | @tsv' /tmp/release-diagnostics/runs.json
            echo
            echo 'check_runs:'
            jq -r '.check_runs[] | [.id,.name,.status,(.conclusion // ""),(.output.title // ""),(.output.summary // ""),.html_url] | @tsv' /tmp/release-diagnostics/check-runs.json
            echo
            echo 'check_suites:'
            jq -r '.check_suites[] | [.id,.status,(.conclusion // ""),.app.slug,.url] | @tsv' /tmp/release-diagnostics/check-suites.json
            echo
            echo 'release:'
            if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TARGET_TAG" > /tmp/release-diagnostics/release.json 2>/tmp/release-diagnostics/release-error.txt; then
              jq -r '[.tag_name,.target_commitish,.html_url,([.assets[].name]|join(","))] | @tsv' /tmp/release-diagnostics/release.json
            else
              cat /tmp/release-diagnostics/release-error.txt
            fi
          } | tee /tmp/release-diagnostics/summary.txt

          while read -r run_id; do
            test -n "$run_id" || continue
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100" > "/tmp/release-diagnostics/jobs-$run_id.json"
          done < <(jq -r '.workflow_runs[].id' /tmp/release-diagnostics/runs.json)
      - uses: actions/upload-artifact@v4
        with:
          name: v4.3.3-release-diagnostics
          path: /tmp/release-diagnostics
          retention-days: 1
