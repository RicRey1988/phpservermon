name: Diagnose workflow YAML hotfix

on:
  pull_request:
    branches: [main]
    paths: ['.agent/workflow-yaml-diagnostic-trigger.txt']

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/workflow-yaml-v4.3.3
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Capture patch and actionlint diagnostics
        run: |
          set +e
          mkdir -p /tmp/workflow-hotfix-diagnostics
          git apply --check --whitespace=error-all .agent/workflow-yaml-fix.patch > /tmp/workflow-hotfix-diagnostics/apply-check.txt 2>&1
          echo "apply_check_exit=$?" > /tmp/workflow-hotfix-diagnostics/status.txt
          git apply --whitespace=error-all .agent/workflow-yaml-fix.patch > /tmp/workflow-hotfix-diagnostics/apply.txt 2>&1
          echo "apply_exit=$?" >> /tmp/workflow-hotfix-diagnostics/status.txt
          go install github.com/rhysd/actionlint/cmd/actionlint@latest > /tmp/workflow-hotfix-diagnostics/go-install.txt 2>&1
          echo "go_install_exit=$?" >> /tmp/workflow-hotfix-diagnostics/status.txt
          "$(go env GOPATH)/bin/actionlint" -color=false .github/workflows/*.yml > /tmp/workflow-hotfix-diagnostics/actionlint.txt 2>&1
          echo "actionlint_exit=$?" >> /tmp/workflow-hotfix-diagnostics/status.txt
          cat /tmp/workflow-hotfix-diagnostics/status.txt
          cat /tmp/workflow-hotfix-diagnostics/apply-check.txt
          cat /tmp/workflow-hotfix-diagnostics/apply.txt
          cat /tmp/workflow-hotfix-diagnostics/actionlint.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: workflow-yaml-hotfix-diagnostics
          path: /tmp/workflow-hotfix-diagnostics
          retention-days: 1
