name: Export agent worktree

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Archive repository worktree
        run: tar -czf /tmp/agent-worktree.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: agent-worktree
          path: /tmp/agent-worktree.tgz
          retention-days: 1
