name: Export agent worktree

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ctype, curl, filter, gd, intl, json, libxml, mbstring, openssl, pdo_mysql, xml, zip
          coverage: none
      - run: composer install --no-interaction --prefer-dist
      - name: Archive repository worktree
        run: tar -czf /tmp/agent-worktree.tgz .
      - uses: actions/upload-artifact@v4
        with:
          name: agent-worktree
          path: /tmp/agent-worktree.tgz
          retention-days: 1
