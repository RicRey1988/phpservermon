name: Release HS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: HS tag to publish (vX.Y.Z-hs)
        required: false
        default: v4.3.4-hs
        type: string

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'release: v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine and validate release identity
        id: identity
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_EVENT_NAME" == 'workflow_dispatch' ]]; then
            release_tag="$DISPATCH_TAG"
          else
            first_line="${COMMIT_MESSAGE%%$'\n'*}"
            release_tag="${first_line#release: }"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-hs$ ]]; then
            echo "Invalid HS tag: $release_tag" >&2
            exit 2
          fi
          version="${release_tag#v}"
          grep -F "define('PSM_VERSION', '$version')" src/includes/psmconfig.inc.php
          test -f "docs/releases/$release_tag.md"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: curl, gd, intl, mbstring, openssl, pdo_mysql, xml, zip
          tools: composer:v2
          coverage: none

      - name: Verify source
        id: verify
        run: |
          set -euo pipefail
          composer validate --strict
          composer install --no-interaction --prefer-dist
          composer check-platform-reqs
          composer audit
          vendor/bin/phpunit
          vendor/bin/phpstan analyse --no-progress
          node --check service-worker.js
          node --check src/templates/default/static/js/app-shell.js
          node --check src/templates/default/static/js/status.js
          node --check src/templates/default/static/js/dashboard.js
          node --check src/templates/default/static/js/history.js
          node --check src/templates/default/static/js/notifications.js

      - name: Create signed production assets
        id: assets
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          version="${{ steps.identity.outputs.version }}"
          test -n "$RELEASE_SIGNING_PRIVATE_KEY"
          composer install --no-dev --classmap-authoritative --no-interaction --prefer-dist
          mkdir -p dist
          php dev/build-hs-release.php "$version" dist
          printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/release-private.pem"
          chmod 600 "$RUNNER_TEMP/release-private.pem"
          openssl dgst -sha256 -sign "$RUNNER_TEMP/release-private.pem" \
            -out "$RUNNER_TEMP/manifest.sig" "dist/phpservermon-$version.json"
          base64 -w 0 "$RUNNER_TEMP/manifest.sig" > "dist/phpservermon-$version.json.sig"
          printf '\n' >> "dist/phpservermon-$version.json.sig"
          base64 -d "dist/phpservermon-$version.json.sig" > "$RUNNER_TEMP/verify.sig"
          openssl dgst -sha256 -verify src/psm/Service/Update/keys/hosting-supremo-release-public.pem \
            -signature "$RUNNER_TEMP/verify.sig" "dist/phpservermon-$version.json"
          rm -f "$RUNNER_TEMP/release-private.pem" "$RUNNER_TEMP/manifest.sig" "$RUNNER_TEMP/verify.sig"

      - name: Create immutable release tag
        id: tag
        run: |
          set -euo pipefail
          git config user.name 'Hosting Supremo Releases'
          git config user.email 'noreply@hostingsupremo.org'
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            tagged_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [[ "$tagged_sha" != "$GITHUB_SHA" ]]; then
              echo "Tag $RELEASE_TAG already points to $tagged_sha, expected $GITHUB_SHA" >&2
              exit 1
            fi
          else
            git tag -a "$RELEASE_TAG" "$GITHUB_SHA" -m "PHP Server Monitor $RELEASE_TAG"
            git push origin "refs/tags/$RELEASE_TAG"
          fi
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$GITHUB_SHA"

      - name: Publish and verify GitHub release
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.identity.outputs.version }}"
          assets=(
            "dist/phpservermon-$version.zip"
            "dist/phpservermon-$version.json"
            "dist/phpservermon-$version.json.sig"
          )
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "PHP Server Monitor $version" --notes-file "docs/releases/$RELEASE_TAG.md"
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --verify-tag --title "PHP Server Monitor $version" --notes-file "docs/releases/$RELEASE_TAG.md"
          fi

          asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
          for expected in \
            "phpservermon-$version.zip" \
            "phpservermon-$version.json" \
            "phpservermon-$version.json.sig"; do
            grep -Fx "$expected" <<<"$asset_names"
          done
          release_url="$(gh release view "$RELEASE_TAG" --json url --jq '.url')"
          {
            echo "## Release $RELEASE_TAG publicada"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- URL: $release_url"
            echo "- Assets: \`phpservermon-$version.zip\`, \`phpservermon-$version.json\`, \`phpservermon-$version.json.sig\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report release workflow result
        if: always()
        run: |
          {
            echo "## Resultado del workflow de release"
            echo
            echo "- Tag: \`${RELEASE_TAG:-no determinado}\`"
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- Identidad: \`${{ steps.identity.outcome }}\`"
            echo "- Verificación: \`${{ steps.verify.outcome }}\`"
            echo "- Assets firmados: \`${{ steps.assets.outcome }}\`"
            echo "- Tag: \`${{ steps.tag.outcome }}\`"
            echo "- Publicación: \`${{ steps.publish.outcome }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
