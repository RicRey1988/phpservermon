name: Validate repaired workflow YAML

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Run actionlint
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          "$(go env GOPATH)/bin/actionlint" -color=false -ignore 'SC2129' .github/workflows/*.yml
      - name: Verify release and VPS identities
        run: |
          set -euo pipefail
          grep -F 'VERSION: 4.3.3-hs' .github/workflows/vps-ops-chatops.yml
          grep -F "psm-static-4.3.3-hs-r1" .github/workflows/vps-ops-chatops.yml
          grep -F "startsWith(github.event.head_commit.message, 'release: v')" .github/workflows/release-hs.yml
