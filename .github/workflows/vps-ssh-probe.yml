name: One-shot VPS SSH probe

# Triggered after initial workflow registration.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/vps-ssh-probe.yml'

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 147.135.112.18
      VPS_PORT: '8615'
      VPS_USER: root
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install SSH client tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-client sshpass netcat-openbsd

      - name: Decrypt one-shot credential
        env:
          RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_SIGNING_PRIVATE_KEY"
          printf '%s' "$RELEASE_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/release-private.pem"
          chmod 600 "$RUNNER_TEMP/release-private.pem"
          base64 -d .github/deploy/vps-password.enc.b64 > "$RUNNER_TEMP/vps-password.enc"
          openssl pkeyutl -decrypt \
            -inkey "$RUNNER_TEMP/release-private.pem" \
            -in "$RUNNER_TEMP/vps-password.enc" \
            -out "$RUNNER_TEMP/vps-password.txt" \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256 \
            -pkeyopt rsa_mgf1_md:sha256
          chmod 600 "$RUNNER_TEMP/vps-password.txt"
          echo "::add-mask::$(cat "$RUNNER_TEMP/vps-password.txt")"

      - name: Probe SSH and application environment
        id: probe
        shell: bash
        run: |
          set -u
          REPORT=.github/deploy/ssh-probe-report.txt
          : > "$REPORT"
          {
            echo "commit=$GITHUB_SHA"
            echo "checked_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "target=$VPS_HOST:$VPS_PORT"
          } >> "$REPORT"

          set +e
          timeout 15 nc -4 -vz "$VPS_HOST" "$VPS_PORT" >> "$REPORT" 2>&1
          nc_code=$?
          echo "tcp_probe_exit=$nc_code" >> "$REPORT"

          sshpass -f "$RUNNER_TEMP/vps-password.txt" ssh -4 \
            -p "$VPS_PORT" \
            -o ConnectTimeout=20 \
            -o ConnectionAttempts=2 \
            -o StrictHostKeyChecking=accept-new \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            "$VPS_USER@$VPS_HOST" 'bash -s' >> "$REPORT" 2>&1 <<'REMOTE'
          set -u
          echo 'ssh_connection=ok'
          echo "hostname=$(hostname -f 2>/dev/null || hostname)"
          if test -r /etc/os-release; then . /etc/os-release; echo "os=${PRETTY_NAME:-unknown}"; fi
          echo "kernel=$(uname -r)"
          echo "sshd_port=$(sshd -T 2>/dev/null | awk '$1=="port" {print $2; exit}')"
          echo "php=$(php -r 'echo PHP_VERSION;' 2>/dev/null || true)"
          echo "composer=$(composer --version 2>/dev/null | head -n1 || true)"
          echo "httpd=$(systemctl is-active httpd 2>/dev/null || true)"
          echo "php_fpm=$(systemctl is-active php-fpm 2>/dev/null || true)"
          echo "mariadb=$(systemctl is-active mariadb 2>/dev/null || true)"
          VHOST_FILE=$(grep -RilE '^[[:space:]]*ServerName[[:space:]]+monitoreo\.hostingsupremo\.org([[:space:]]|$)' /etc/httpd/conf /etc/httpd/conf.d 2>/dev/null | head -n1)
          echo "vhost_file=$VHOST_FILE"
          APP_ROOT=''
          if test -n "$VHOST_FILE"; then
            APP_ROOT=$(awk 'tolower($1)=="documentroot" {gsub(/"/,"",$2); print $2; exit}' "$VHOST_FILE")
          fi
          echo "app_root=$APP_ROOT"
          if test -n "$APP_ROOT" && test -d "$APP_ROOT"; then
            echo "app_owner_group=$(stat -c '%U:%G' "$APP_ROOT")"
            echo "app_mode=$(stat -c '%a' "$APP_ROOT")"
            if test -f "$APP_ROOT/src/includes/psmconfig.inc.php"; then
              grep -E "define\('PSM_VERSION'" "$APP_ROOT/src/includes/psmconfig.inc.php" | head -n1 | sed 's/^/deployed_/'
            fi
            echo 'app_top_level_begin'
            find "$APP_ROOT" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort
            echo 'app_top_level_end'
          fi
REMOTE
          ssh_code=$?
          set -e
          echo "ssh_probe_exit=$ssh_code" >> "$REPORT"
          echo "probe_code=$ssh_code" >> "$GITHUB_OUTPUT"

      - name: Persist probe report
        if: always()
        run: |
          set -euo pipefail
          git config user.name 'Hosting Supremo Deployment Probe'
          git config user.email 'noreply@hostingsupremo.org'
          git add .github/deploy/ssh-probe-report.txt
          if ! git diff --cached --quiet; then
            git commit -m 'chore: capture VPS SSH probe [skip ci]'
            git push origin HEAD:main
          fi

      - name: Remove decrypted credential
        if: always()
        run: rm -f "$RUNNER_TEMP/release-private.pem" "$RUNNER_TEMP/vps-password.enc" "$RUNNER_TEMP/vps-password.txt"

      - name: Preserve probe result
        if: steps.probe.outputs.probe_code != '0'
        run: exit 1
