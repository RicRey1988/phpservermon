<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3a57e8">
  <title>Server Monitor · Sin conexión</title>
  <style>
    :root{font-family:system-ui,sans-serif;color-scheme:light dark}body{min-height:100vh;margin:0;display:grid;place-items:center;background:#151824;color:#eef0f8}.card{width:min(32rem,calc(100% - 2rem));padding:2rem;border:1px solid #343946;border-radius:1rem;background:#20242d;box-shadow:0 .75rem 2rem #0004}.mark{width:3.5rem;height:3.5rem;display:grid;place-items:center;border-radius:1rem;background:#3a57e8;color:#fff;font-weight:800}p{color:#b8becd;line-height:1.6}button{padding:.75rem 1rem;border:0;border-radius:.65rem;background:#3a57e8;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="card"><div class="mark">HS</div><h1>Sin conexión</h1><p>No se pudo contactar al monitor. Los datos privados no se guardan en este dispositivo; vuelve a intentarlo cuando recuperes conexión.</p><button type="button" onclick="location.reload()">Reintentar</button></main>
</body>
</html>
