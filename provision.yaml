---
- hosts: all
  become: true
  tasks:
    - name: Add the PHP package repository
      ansible.builtin.apt_repository:
        repo: ppa:ondrej/php

    - name: Install the PHP 8.5 development stack
      ansible.builtin.apt:
        update_cache: true
        name:
          - composer
          - mysql-server
          - nginx
          - php8.5-cli
          - php8.5-curl
          - php8.5-fpm
          - php8.5-mbstring
          - php8.5-mysql
          - php8.5-xml
        state: present

    - name: Start MySQL
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: true

    - name: Create the development database
      ansible.builtin.command: /vagrant/setup-mysql.sh
      changed_when: false

    - name: Install Composer dependencies
      ansible.builtin.command: /vagrant/setup-php.sh
      changed_when: false

    - name: Install the nginx virtual host
      ansible.builtin.copy:
        src: /vagrant/dev/phpservermon-default
        dest: /etc/nginx/sites-available/default
        remote_src: true
        mode: '0644'

    - name: Install the development configuration
      ansible.builtin.copy:
        src: /vagrant/dev/vagrant-config.php
        dest: /vagrant/config.php
        remote_src: true
        mode: '0644'

    - name: Start PHP 8.5 FPM
      ansible.builtin.service:
        name: php8.5-fpm
        state: started
        enabled: true

    - name: Restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
        enabled: true
