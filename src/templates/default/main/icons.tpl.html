{% macro icon(name, className) %}
<svg class="hope-icon {{ className|default('') }}" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
{% if name in ['category','chart-pie','dashboard','th','grid'] %}<path d="M3.5 6.5a3 3 0 0 1 3-3h2v7h-5v-4Zm0 9a3 3 0 0 1 3-3h2v8h-2a3 3 0 0 1-3-3v-2Zm8-12h6a3 3 0 0 1 3 3v4h-9v-7Zm0 9h9v5a3 3 0 0 1-3 3h-6v-8Z" fill="currentColor"/>
{% elseif name in ['chart','chart-line','statistics'] %}<path d="M4 19V5m0 14h16M7 15l3-3 3 2 5-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name in ['server','database'] %}<rect x="3" y="4" width="18" height="6" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="18" height="6" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M7 7h.01M7 17h.01M11 7h6M11 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
{% elseif name in ['history','log'] %}<path d="M4.6 8A8 8 0 1 1 4 14m.6-6H9M4.6 8V3.6M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name in ['users','user-group'] %}<path d="M9 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm6.5-1a3 3 0 1 0 0-6M3 20v-2a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v2m1-7a5 5 0 0 1 5 5v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
{% elseif name in ['settings','sliders-h','configure'] %}<path d="M4 7h10m4 0h2M4 17h2m4 0h10M14 4v6M10 14v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="16" cy="7" r="2" stroke="currentColor" stroke-width="1.8"/><circle cx="8" cy="17" r="2" stroke="currentColor" stroke-width="1.8"/>
{% elseif name in ['tools','system'] %}<path d="m14.2 6.3 3.5 3.5M12.8 7.7l3.5 3.5M5 19l8.5-8.5M14 5l2-2 5 5-2 2M4 14l6 6M4 20l-1-1 3-5 4 4-5 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
{% elseif name in ['sync','sync-alt','refresh','update'] %}<path d="M20 7v5h-5M4 17v-5h5m10-2a8 8 0 0 0-13-3l-2 5m1 2a8 8 0 0 0 13 3l2-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'search' %}<circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="m16 16 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
{% elseif name == 'moon' %}<path d="M20 15.5A8 8 0 0 1 8.5 4 8 8 0 1 0 20 15.5Z" fill="currentColor"/>
{% elseif name == 'sun' %}<circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
{% elseif name in ['gear','cog'] %}<path d="M9.5 3h5l.6 2.1 1.8 1 2.1-.6 2.5 4.3-1.5 1.6v2.1l1.5 1.6-2.5 4.3-2.1-.6-1.8 1-.6 2.2h-5l-.6-2.2-1.8-1-2.1.6-2.5-4.3L4 13.5v-2.1L2.5 9.8 5 5.5l2.1.6 1.8-1L9.5 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="12" cy="12.5" r="3" stroke="currentColor" stroke-width="1.7"/>
{% elseif name == 'bell' %}<path d="M6 10a6 6 0 0 1 12 0v4l2 3H4l2-3v-4Zm4 10h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'download' %}<path d="M12 3v12m0 0 4-4m-4 4-4-4M5 20h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name in ['menu','bars'] %}<path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
{% elseif name == 'arrow-left' %}<path d="M19 12H5m0 0 6-6m-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'user' %}<circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
{% elseif name == 'logout' %}<path d="M10 5H5v14h5m4-3 4-4-4-4m4 4H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'eye' %}<path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="1.7"/><circle cx="12" cy="12" r="2.5" stroke="currentColor" stroke-width="1.7"/>
{% elseif name == 'bolt' %}<path d="m13.5 2-8 12h6L10.5 22l8-12h-6l1-8Z" fill="currentColor"/>
{% elseif name in ['warning','exclamation-triangle'] %}<path d="M12 3 2.5 20h19L12 3Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/><path d="M12 9v5m0 3h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
{% elseif name in ['cloud-upload-alt','cloud-download-alt'] %}<path d="M7 18H6a4 4 0 0 1-.5-8A6.5 6.5 0 0 1 18 8.5 4.5 4.5 0 0 1 18 18h-1M12 20V10m0 0-3 3m3-3 3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'trash' %}<path d="M4 7h16M9 7V4h6v3m3 0-1 14H7L6 7m4 4v6m4-6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'edit' %}<path d="M4 20h4L19 9l-4-4L4 16v4Zm9-13 4 4M4 20h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name in ['check','check-circle'] %}<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="m8 12 2.5 2.5L16.5 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% elseif name == 'times-circle' %}<circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="m9 9 6 6m0-6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
{% elseif name in ['lock','shield-alt'] %}<path d="M6 10h12v10H6V10Zm3 0V7a3 3 0 0 1 6 0v3m-3 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
{% else %}<circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="2" fill="currentColor"/>{% endif %}
</svg>
{% endmacro %}
