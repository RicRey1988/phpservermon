<nav class="sidebar-list d-flex flex-column h-100" aria-label="Secciones">
	<ul class="navbar-nav iq-main-menu flex-grow-1" id="sidebar-menu">
		{% for item in menu %}
		<li class="nav-item">
			<a class="nav-link {{ item.active }}" href="{{ item.url|raw }}"{% if item.active %} aria-current="page"{% endif %}>
				<span class="item-icon" aria-hidden="true"><i class="fas fa-{{ item.icon }}"></i></span>
				<span class="item-name">{{ item.label }}</span>
				{% if item.active %}<span class="visually-hidden"> ({{ label_current }})</span>{% endif %}
			</a>
		</li>
		{% endfor %}
	</ul>
	<div class="sidebar-user border-top pt-3 mt-3">
		<p class="small text-muted mb-2 px-3">{{ label_usermenu }}</p>
		<a class="nav-link" href="{{ url_profile|raw }}"><i class="fas fa-user me-2" aria-hidden="true"></i>{{ label_profile }}</a>
		<a class="nav-link" href="{{ url_logout|raw }}"><i class="fas fa-sign-out-alt me-2" aria-hidden="true"></i>{{ label_logout }}</a>
	</div>
</nav>
