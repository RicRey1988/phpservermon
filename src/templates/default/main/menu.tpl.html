<nav aria-label="Secciones">
    <ul class="navbar-nav iq-main-menu" id="sidebar-menu">
        {% for item in menu %}<li class="nav-item"><a class="nav-link {{ item.active }}" href="{{ item.url|raw }}"{% if item.active %} aria-current="page"{% endif %}><i class="icon"><i class="fas fa-{{ item.icon }}" aria-hidden="true"></i></i><span class="item-name">{{ item.label }}</span>{% if item.active %}<span class="visually-hidden"> ({{ label_current }})</span>{% endif %}</a></li>{% endfor %}
    </ul>
    <hr class="hr-horizontal">
    <ul class="navbar-nav iq-main-menu sidebar-user">
        <li class="nav-item px-3 pb-2"><small class="text-muted">{{ label_usermenu }}</small></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_profile|raw }}"><i class="icon"><i class="fas fa-user" aria-hidden="true"></i></i><span class="item-name">{{ label_profile }}</span></a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_logout|raw }}"><i class="icon"><i class="fas fa-sign-out-alt" aria-hidden="true"></i></i><span class="item-name">{{ label_logout }}</span></a></li>
    </ul>
</nav>
