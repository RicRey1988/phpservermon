{% block results %}
{% if messages %}
	{% for msg in messages %}
		<div class="alert alert-{{ msg.class }} d-flex align-items-start gap-3" role="status">
			<div><span class="badge bg-{{ msg.class }}">{{ msg.shortcode }}</span></div>
			{% autoescape false %}
			<div class="flex-grow-1">{{ msg.message }}</div>
			{% endautoescape %}
		</div>
	{% endfor %}
	<div class="w-100 mb-4"></div>
{% endif %}
{% endblock %}
