<div class="d-flex flex-wrap align-items-center justify-content-between gap-3">
    <form method="get" action="index.php" class="d-flex align-items-center gap-2">
        <input type="hidden" name="mod" value="server_status">
        <label class="form-label mb-0" for="dashboard-range">Periodo</label>
        <select class="form-select form-select-sm" id="dashboard-range" name="range" onchange="this.form.submit()">
            <option value="24h"{% if range == '24h' %} selected{% endif %}>24 horas</option>
            <option value="7d"{% if range == '7d' %} selected{% endif %}>7 días</option>
            <option value="30d"{% if range == '30d' %} selected{% endif %}>30 días</option>
            <option value="90d"{% if range == '90d' %} selected{% endif %}>90 días</option>
        </select>
    </form>
    <div class="d-flex align-items-center gap-2">
    <button type="button" class="btn btn-primary btn-sm" data-run-update data-update-url="{{ url_update|raw }}">
        <i class="fas fa-sync-alt me-1" aria-hidden="true"></i><span data-update-label>Actualizar ahora</span>
    </button>
    <div class="btn-group btn-group-sm" role="group" aria-label="Presentación de servidores">
        <button type="button" class="btn btn-outline-secondary{% if block_layout_active %} active{% endif %}" id="block-layout" aria-label="Tarjetas" onclick="psm_saveLayout(0)">
            <i class="fas fa-th" aria-hidden="true"></i>
        </button>
        <button type="button" class="btn btn-outline-secondary{% if list_layout_active %} active{% endif %}" id="table-layout" aria-label="Lista de tarjetas" onclick="psm_saveLayout(1)">
            <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
    </div>
    </div>
</div>
