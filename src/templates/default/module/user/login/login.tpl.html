{% import 'main/macros.tpl.html' as macro %}
<div class="auth-layout">
  <section class="auth-brand-panel" aria-hidden="true">
    <span class="brand-mark brand-mark-lg">HS</span>
    <h2>Control total de tus servicios</h2>
    <p>Estado, historial e incidencias desde una interfaz clara y segura.</p>
  </section>
  <form class="auth-card card" method="post">
    {{ macro.input_csrf() }}
    <div class="card-body p-4 p-lg-5">
      <p class="eyebrow mb-2">Hosting Supremo</p>
      <h1 class="h3 mb-4">{{ title_sign_in }}</h1>
      <div class="mb-3">
        <label class="form-label" for="input-username">{{ label_username }}</label>
        <input type="text" name="user_name" id="input-username" class="form-control" value="{{ value_user_name }}" autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="input-password">{{ label_password }}</label>
        <div class="input-group">
          <input type="password" id="input-password" name="user_password" class="form-control" autocomplete="current-password" required>
          <button class="btn btn-outline-secondary" type="button" data-password-toggle="input-password" aria-label="Mostrar contraseña"><i class="fas fa-eye" aria-hidden="true"></i></button>
        </div>
      </div>
      <input type="hidden" name="action" value="login">
      <div class="form-check mb-3">
        <input type="checkbox" name="user_rememberme" value="1" class="form-check-input" id="input-rememberme" {{ value_rememberme }}>
        <label class="form-check-label" for="input-rememberme">{{ label_remember_me }}</label>
      </div>
      <div aria-live="polite" class="visually-hidden" id="login-status"></div>
      <button class="btn btn-lg btn-primary w-100" type="submit">{{ label_login }}</button>
      <a class="btn btn-link w-100 mt-2" href="?action=forgot">{{ label_password_forgot }}</a>
    </div>
  </form>
</div>
