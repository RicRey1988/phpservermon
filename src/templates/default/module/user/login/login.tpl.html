{% import 'main/macros.tpl.html' as macro %}
{% import 'main/icons.tpl.html' as hope %}
<div class="auth-shell auth-layout">
  <section class="auth-form-pane">
    <form class="auth-card card" method="post">
      {{ macro.input_csrf() }}
      <div class="card-body p-0">
        <a href="index.php" class="navbar-brand d-inline-flex align-items-center gap-3 mb-5"><span class="brand-mark">HS</span><span class="h4 mb-0">Server Monitor</span></a>
        <h1 class="h2 text-center mb-2">{{ title_sign_in }}</h1>
        <p class="text-muted text-center mb-4">Accede para administrar tus servicios.</p>
        <div class="mb-3"><label class="form-label" for="input-username">{{ label_username }}</label><input type="text" name="user_name" id="input-username" class="form-control form-control-lg" value="{{ value_user_name }}" autocomplete="username" required autofocus></div>
        <div class="mb-3"><label class="form-label" for="input-password">{{ label_password }}</label><div class="input-group"><input type="password" id="input-password" name="user_password" class="form-control form-control-lg" autocomplete="current-password" required><button class="btn btn-outline-secondary" type="button" data-password-toggle="input-password" aria-label="Mostrar contraseña">{{ hope.icon('eye') }}</button></div></div>
        <input type="hidden" name="action" value="login">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4"><div class="form-check"><input type="checkbox" name="user_rememberme" value="1" class="form-check-input" id="input-rememberme" {{ value_rememberme }}><label class="form-check-label" for="input-rememberme">{{ label_remember_me }}</label></div><a href="?action=forgot">{{ label_password_forgot }}</a></div>
        <div aria-live="polite" class="visually-hidden" id="login-status"></div>
        <button class="btn btn-lg btn-primary d-block mx-auto px-5" type="submit">{{ label_login }}</button>
        <p class="text-center text-muted small mt-5 mb-0">PHP Server Monitor · Mejorado por Hosting Supremo</p>
      </div>
    </form>
  </section>
  <aside class="auth-visual" aria-hidden="true"><div class="auth-visual-brand"><span class="brand-mark brand-mark-lg">HS</span></div></aside>
</div>
